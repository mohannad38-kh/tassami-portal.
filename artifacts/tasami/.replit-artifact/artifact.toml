kind = "web"
previewPath = "/"
title = "Tasami - تسامي"
version = "1.0.0"
id = "artifacts/tasami"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20688

[services.development]
run = "pnpm --filter @workspace/tasami run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tasami", "run", "build" ]
publicDir = "artifacts/tasami/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20688"
BASE_PATH = "/"
