        title:
          type: string
        imageUrl:
          type: string
        eventId:
          type: integer

    # ─── DASHBOARD ───────────────────────────────────────────────────────────
    DashboardStats:
      type: object
      required: [totalMembers, totalEvents, totalWorkshops, totalDepartments, pendingRequests, totalVolunteerHours, upcomingEvents]
      properties:
        totalMembers:
          type: integer
        totalEvents:
          type: integer
        totalWorkshops:
          type: integer
        totalDepartments:
          type: integer
        pendingRequests:
          type: integer
        totalVolunteerHours:
          type: number
        upcomingEvents:
          type: integer
        activeTasks:
          type: integer

    ActivityItem:
      type: object
      required: [id, type, description, createdAt]
      properties:
        id:
